name: PhytoScan CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  

jobs:
  ci:
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: super_cle_secrete_tres_longue_pour_les_tests
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      GEMINI_API_KEY: fake_gemini_key
      GROQ_API_KEY: fake_groq_key
      OPENAI_API_KEY: fake_openai_key
      MLFLOW_TRACKING_URI: http://localhost:5000
      DATA_ROOT: ${{ github.workspace }}/backend/data

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Libérer de l'espace disque sur le runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r backend/requirements.txt
          pip install --no-cache-dir httpx

      - name: Tests Unitaires (API, Authentification, Mocks IA)
        run: |
          cd backend
          pytest tests/ --disable-warnings
          
      - name: Qualité du code (Linting & Formatting) 
        continue-on-error: true 
        run: |
          black --check app/ rag/ scripts/
          flake8 app/ rag/ scripts/ --max-line-length=120

  cd:
    runs-on: ubuntu-latest
    needs: ci 
    
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Docker image (Backend)
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          
          docker build -t ${{ secrets.DOCKER_USERNAME }}/phytoscan-api:${IMAGE_TAG} \
             -t ${{ secrets.DOCKER_USERNAME }}/phytoscan-api:latest \
             ./backend
          
          docker push ${{ secrets.DOCKER_USERNAME }}/phytoscan-api:${IMAGE_TAG}
          docker push ${{ secrets.DOCKER_USERNAME }}/phytoscan-api:latest